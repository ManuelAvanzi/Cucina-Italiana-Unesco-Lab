services:
  - type: web
    name: cucina-italiana-unesco-lab
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DATA_DIR
        value: /var/data
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
