<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione Istituto — Cucina Italiana UNESCO Lab</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232D6A4F'/></svg>">
  <style>
    .login-card { max-width: 520px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .step-indicator { display: flex; gap: .5rem; justify-content: center; margin-bottom: 1.5rem; }
    .step { width: 28px; height: 4px; border-radius: 2px; background: #e0e0e0; transition: background .3s; }
    .step.active { background: #2D6A4F; }
    .step.done { background: #81b99a; }
    .step-section { display: none; }
    .step-section.active { display: block; }
    .step-title { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin-bottom: 1.25rem; font-weight: 700; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"></div>
      <h1>Registra il tuo Istituto</h1>
      <p>Unisciti al progetto Cucina Italiana UNESCO Lab</p>
    </div>

    <div class="step-indicator">
      <div class="step active" id="step-dot-1"></div>
      <div class="step" id="step-dot-2"></div>
    </div>

    <div id="reg-alert"></div>

    <form id="reg-form" autocomplete="on" novalidate>

      <!-- STEP 1: Dati istituto -->
      <div class="step-section active" id="step-1">
        <div class="step-title">Passo 1 di 2 — Dati dell'istituto</div>

        <div class="form-group">
          <label for="nome">Nome istituto <span style="color:#C44B2F">*</span></label>
          <input type="text" id="nome" class="form-control" placeholder="I.P.S.S.A.R. …" required autocomplete="organization">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="citta">Città <span style="color:#C44B2F">*</span></label>
            <input type="text" id="citta" class="form-control" placeholder="Roma" required>
          </div>
          <div class="form-group">
            <label for="provincia">Provincia</label>
            <input type="text" id="provincia" class="form-control" placeholder="RM" maxlength="3">
          </div>
        </div>

        <div class="form-group">
          <label for="regione">Regione <span style="color:#C44B2F">*</span></label>
          <select id="regione" class="form-control" required>
            <option value="">— Seleziona regione —</option>
            <option>Abruzzo</option><option>Basilicata</option><option>Calabria</option>
            <option>Campania</option><option>Emilia-Romagna</option><option>Friuli Venezia Giulia</option>
            <option>Lazio</option><option>Liguria</option><option>Lombardia</option>
            <option>Marche</option><option>Molise</option><option>Piemonte</option>
            <option>Puglia</option><option>Sardegna</option><option>Sicilia</option>
            <option>Toscana</option><option>Trentino-Alto Adige</option><option>Umbria</option>
            <option>Valle d'Aosta</option><option>Veneto</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Email istituzionale <span style="color:#C44B2F">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="segreteria@istituto.edu.it" required autocomplete="email">
        </div>

        <button type="button" class="btn btn-primary btn-block" id="btn-next" style="margin-top:.5rem;">
          Avanti &rarr;
        </button>
      </div>

      <!-- STEP 2: Credenziali accesso -->
      <div class="step-section" id="step-2">
        <div class="step-title">Passo 2 di 2 — Credenziali di accesso</div>

        <div class="form-group">
          <label for="username">Username <span style="color:#C44B2F">*</span></label>
          <input type="text" id="username" class="form-control" placeholder="ipssar_roma" required autocomplete="username"
            pattern="[a-zA-Z0-9_]{3,30}" title="Solo lettere, numeri e underscore (3-30 caratteri)">
          <small style="color:#999;font-size:.75rem;">Solo lettere, numeri e underscore. Non modificabile dopo la registrazione.</small>
        </div>

        <div class="form-group">
          <label for="password">Password <span style="color:#C44B2F">*</span></label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-control" placeholder="Minimo 8 caratteri" required
              autocomplete="new-password" minlength="8">
            <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:1rem;" aria-label="Mostra password">•••</button>
          </div>
        </div>

        <div class="form-group">
          <label for="password2">Conferma password <span style="color:#C44B2F">*</span></label>
          <input type="password" id="password2" class="form-control" placeholder="Ripeti la password" required autocomplete="new-password">
        </div>

        <div style="display:flex;gap:.75rem;margin-top:.5rem;">
          <button type="button" class="btn btn-outline" id="btn-back" style="flex:0 0 auto;">
            &larr; Indietro
          </button>
          <button type="submit" class="btn btn-primary btn-block" id="reg-btn">
            <span id="reg-label">Registra istituto</span>
          </button>
        </div>
      </div>

    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:.82rem;color:#999;">
      Hai già un account?
      <a href="/dashboard/login.html" style="color:#2D6A4F;font-weight:600;">Accedi</a>
      &nbsp;·&nbsp;
      <a href="/" style="color:#888;">Torna al sito</a>
    </div>
  </div>
</div>

<script>
const API = '/api';

// Step navigation
let currentStep = 1;
const totalSteps = 2;

function goToStep(n) {
  document.getElementById('step-' + currentStep).classList.remove('active');
  document.getElementById('step-dot-' + currentStep).classList.remove('active');
  document.getElementById('step-dot-' + currentStep).classList.add('done');
  currentStep = n;
  document.getElementById('step-' + n).classList.add('active');
  document.getElementById('step-dot-' + n).classList.add('active');
  document.getElementById('step-dot-' + n).classList.remove('done');
}

document.getElementById('btn-next').addEventListener('click', () => {
  const nome = document.getElementById('nome').value.trim();
  const citta = document.getElementById('citta').value.trim();
  const regione = document.getElementById('regione').value;
  const email = document.getElementById('email').value.trim();
  const alert = document.getElementById('reg-alert');

  if (!nome || !citta || !regione || !email) {
    alert.innerHTML = '<div class="alert alert-error">Compila tutti i campi obbligatori.</div>';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert.innerHTML = '<div class="alert alert-error">Inserisci un indirizzo email valido.</div>';
    return;
  }
  alert.innerHTML = '';
  goToStep(2);
});

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('reg-alert').innerHTML = '';
  document.getElementById('step-' + currentStep).classList.remove('active');
  document.getElementById('step-dot-' + currentStep).classList.remove('active');
  currentStep = 1;
  document.getElementById('step-1').classList.add('active');
  document.getElementById('step-dot-1').classList.add('active');
  document.getElementById('step-dot-1').classList.remove('done');
  document.getElementById('step-dot-2').classList.remove('done');
});

document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const alertEl = document.getElementById('reg-alert');
  const btn = document.getElementById('reg-btn');
  const label = document.getElementById('reg-label');

  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (password !== password2) {
    alertEl.innerHTML = '<div class="alert alert-error">Le password non coincidono.</div>';
    return;
  }
  if (password.length < 8) {
    alertEl.innerHTML = '<div class="alert alert-error">La password deve essere di almeno 8 caratteri.</div>';
    return;
  }
  const username = document.getElementById('username').value.trim();
  if (!/^[a-zA-Z0-9_]{3,30}$/.test(username)) {
    alertEl.innerHTML = '<div class="alert alert-error">Username non valido: usa solo lettere, numeri e underscore (3-30 caratteri).</div>';
    return;
  }

  alertEl.innerHTML = '';
  btn.disabled = true;
  label.textContent = 'Registrazione in corso…';

  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: document.getElementById('nome').value.trim(),
        citta: document.getElementById('citta').value.trim(),
        regione: document.getElementById('regione').value,
        provincia: document.getElementById('provincia').value.trim() || undefined,
        email: document.getElementById('email').value.trim(),
        username,
        password
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore durante la registrazione');

    localStorage.setItem('token', data.token);
    localStorage.setItem('istituto', JSON.stringify(data.istituto));
    window.location = '/dashboard/index.html';
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    btn.disabled = false;
    label.textContent = 'Registra istituto';
  }
});
</script>
</body>
</html>
