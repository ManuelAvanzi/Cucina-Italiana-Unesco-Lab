<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso Istituti — Cucina Italiana UNESCO Lab</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232D6A4F'/></svg>">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"></div>
      <h1>Cucina Italiana UNESCO Lab</h1>
      <p>Area riservata istituti alberghieri</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="username_istituto" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:1rem;" aria-label="Mostra password">•••</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn" style="margin-top:.5rem;">
        <span id="login-label">Accedi</span>
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;font-size:.82rem;color:#999;">
      <a href="/" style="color:#2D6A4F;">&#8592; Torna al sito</a>
      &nbsp;·&nbsp;
      <a href="/admin/login.html" style="color:#888;">Accesso Admin</a>
    </div>

    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #eee;text-align:center;">
      <p style="font-size:.82rem;color:#666;margin-bottom:.75rem;">Non hai ancora un account?</p>
      <a href="/dashboard/registrati.html" class="btn btn-outline btn-block" style="font-size:.9rem;">
        Registra il tuo istituto
      </a>
    </div>
  </div>
</div>

<script>
const API = '/api';

// Redirect if already logged in
const token = localStorage.getItem('token');
if (token) {
  fetch(API + '/auth/verify', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.json()).then(d => { if (d.valid && d.payload.role === 'istituto') window.location = '/dashboard/index.html'; });
}

// Toggle password visibility
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const label = document.getElementById('login-label');
  const alertEl = document.getElementById('login-alert');
  alertEl.innerHTML = '';
  btn.disabled = true;
  label.textContent = 'Accesso in corso…';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore di accesso');
    localStorage.setItem('token', data.token);
    localStorage.setItem('istituto', JSON.stringify(data.istituto));
    window.location = '/dashboard/index.html';
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    btn.disabled = false;
    label.textContent = 'Accedi';
  }
});
</script>
</body>
</html>
