<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambio Password — Admin</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="login-page" style="background:linear-gradient(135deg,#1a1a1a 0%,#5c1a0a 100%);">
  <div class="login-card" style="max-width:420px;">
    <div class="login-logo">
      <div class="logo-icon" style="background:#C44B2F;"></div>
      <h1 style="font-size:1.3rem;">Cambio Password Obbligatorio</h1>
      <p style="color:#888;font-size:.85rem;margin-top:.5rem;">Per sicurezza devi cambiare la password di default prima di continuare.</p>
    </div>
    <div id="alert-box"></div>
    <form id="change-form">
      <div class="form-group">
        <label for="current">Password attuale</label>
        <input type="password" id="current" class="form-control" placeholder="Password attuale" autocomplete="current-password" required>
      </div>
      <div class="form-group">
        <label for="newpwd">Nuova password</label>
        <input type="password" id="newpwd" class="form-control" placeholder="Almeno 8 caratteri" autocomplete="new-password" required minlength="8">
      </div>
      <div class="form-group">
        <label for="confirm">Conferma nuova password</label>
        <input type="password" id="confirm" class="form-control" placeholder="Ripeti la nuova password" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label">Cambia Password</span>
      </button>
    </form>
  </div>
</div>
<script>
// Verifica che l'admin sia loggato
const token = localStorage.getItem('admin_token');
if (!token) window.location = '/admin/login.html';

document.getElementById('change-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById('alert-box');
  const btn = document.getElementById('submit-btn');
  const label = document.getElementById('submit-label');
  alertBox.innerHTML = '';

  const currentPassword = document.getElementById('current').value;
  const newPassword = document.getElementById('newpwd').value;
  const confirm = document.getElementById('confirm').value;

  if (newPassword !== confirm) {
    alertBox.innerHTML = '<div class="alert alert-error">Le password non corrispondono</div>';
    return;
  }
  if (newPassword.length < 8) {
    alertBox.innerHTML = '<div class="alert alert-error">La password deve essere di almeno 8 caratteri</div>';
    return;
  }
  if (newPassword === currentPassword) {
    alertBox.innerHTML = '<div class="alert alert-error">La nuova password deve essere diversa da quella attuale</div>';
    return;
  }

  btn.disabled = true;
  label.textContent = 'Aggiornamento in corso...';

  try {
    const res = await fetch('/api/auth/admin/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore');

    // Aggiorna il flag nel localStorage
    try {
      const admin = JSON.parse(localStorage.getItem('admin') || '{}');
      admin.must_change_password = false;
      localStorage.setItem('admin', JSON.stringify(admin));
    } catch {}

    alertBox.innerHTML = '<div class="alert alert-success">Password aggiornata! Redirect in corso...</div>';
    setTimeout(() => { window.location = '/admin/index.html'; }, 1500);
  } catch (err) {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    btn.disabled = false;
    label.textContent = 'Cambia Password';
  }
});
</script>
</body>
</html>
