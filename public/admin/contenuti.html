<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderazione Contenuti — Admin</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand">Admin Panel<small>UNESCO LAB</small></div></div>
    <div class="sidebar-istituto"><div class="nome" id="sb-user">Amministratore</div><div class="citta">Accesso globale</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Pannello</div>
      <a href="/admin/index.html"><span class="nav-icon"></span> Dashboard Admin</a>
      <div class="nav-section-label">Gestione</div>
      <a href="/admin/istituti.html"><span class="nav-icon"></span> Istituti</a>
      <a href="/admin/contenuti.html" class="active"><span class="nav-icon"></span> Contenuti</a>
      <a href="/admin/museo.html"><span class="nav-icon"></span> Museo</a>
      <div class="nav-section-label">Sito</div>
      <a href="/" target="_blank"><span class="nav-icon"></span> Vedi sito pubblico</a>
    </nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="adminLogout()">Esci</button></div>
  </aside>

  <main class="dash-main">
    <header class="dash-topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">Moderazione Contenuti</span>
      </div>
    </header>

    <div class="dash-content">
      <div id="page-alert"></div>

      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
        <input type="text" id="search-input" class="form-control" placeholder="Cerca titolo o istituto…" style="max-width:320px;" oninput="filterTable()">
        <select id="filter-pub" class="form-control" style="max-width:180px;" onchange="filterTable()">
          <option value="">Tutti gli stati</option>
          <option value="1">Solo pubblicati</option>
          <option value="0">Solo bozze</option>
        </select>
        <select id="filter-sezione" class="form-control" style="max-width:200px;" onchange="filterTable()">
          <option value="">Tutte le sezioni</option>
          <option value="artusi">Artusi</option>
          <option value="campanello">Campanello</option>
          <option value="storie">Storie</option>
          <option value="generale">Generale</option>
        </select>
        <span id="count-label" style="font-size:.85rem;color:#888;font-weight:700;"></span>
      </div>

      <div class="panel">
        <div class="panel-body" style="padding:0;">
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th>Titolo</th><th>Istituto</th><th>Tipo</th><th>Sezione</th><th>Stato</th><th>Data</th><th>Azioni</th></tr>
              </thead>
              <tbody id="contenuti-tbody">
                <tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa;">Caricamento…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/admin/js/admin.js"></script>
<script>
let allContenuti = [];

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdmin();
  if (!admin) return;
  document.getElementById('sb-user').textContent = admin.username;
  try {
    allContenuti = await adminFetch('/contenuti/admin/all');
    renderTable(allContenuti);
  } catch (e) { showAlert('page-alert', e.message); }
});

function filterTable() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const pub = document.getElementById('filter-pub').value;
  const sez = document.getElementById('filter-sezione').value;
  renderTable(allContenuti.filter(c => {
    const okQ   = !q   || c.titolo.toLowerCase().includes(q) || (c.istituto_nome||'').toLowerCase().includes(q);
    const okPub = pub === '' || String(c.pubblicato) === pub;
    const okSez = !sez || c.sezione === sez;
    return okQ && okPub && okSez;
  }));
}

function renderTable(list) {
  document.getElementById('count-label').textContent = `${list.length} contenuti`;
  const tipoIcon = { testo:'', ricetta:'', immagine:'', video:'' };
  const sezLabel = { artusi:'Artusi', campanello:'Campanello', storie:'Storie', generale:'Generale' };
  const tbody = document.getElementById('contenuti-tbody');
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa;">Nessun risultato.</td></tr>`; return; }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td style="max-width:220px;"><div style="font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.titolo)}</div></td>
      <td style="font-size:.82rem;">${esc(c.istituto_nome||'—')}</td>
      <td></td>
      <td><span class="badge badge-info" style="font-size:.72rem;">${sezLabel[c.sezione]||c.sezione}</span></td>
      <td>${c.pubblicato ? '<span class="badge badge-success">Pub.</span>' : '<span class="badge badge-warning">Bozza</span>'}</td>
      <td style="font-size:.78rem;color:#aaa;">${formatDate(c.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleContenuto(${c.id}, ${c.pubblicato})" title="${c.pubblicato?'Nascondi':'Pubblica'}">${c.pubblicato?'Nascondi':'Pubblica'}</button>
      </div></td>
    </tr>`).join('');
}

async function toggleContenuto(id, current) {
  try {
    await adminFetch(`/contenuti/admin/${id}/pubblica`, { method: 'PATCH' });
    const c = allContenuti.find(x => x.id === id);
    if (c) c.pubblicato = current ? 0 : 1;
    filterTable();
    showAlert('page-alert', current ? 'Contenuto nascosto.' : 'Contenuto pubblicato!', 'success');
  } catch (e) { showAlert('page-alert', e.message); }
}

window.filterTable = filterTable;
window.toggleContenuto = toggleContenuto;
</script>
</body>
</html>
