<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderazione Contenuti — Admin</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <style>
    .preview-thumb { width:54px;height:40px;object-fit:cover;border-radius:6px;vertical-align:middle; }
    .preview-thumb-placeholder { width:54px;height:40px;border-radius:6px;background:linear-gradient(135deg,#1B4332,#2D6A4F);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;vertical-align:middle; }
    .corpo-preview { font-size:.78rem;color:#888;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .td-actions { display:flex;gap:.4rem;flex-wrap:wrap; }
    .btn-pub { background:#e8f5e9;color:#2D6A4F;border:1px solid #2D6A4F;border-radius:6px;padding:.2rem .6rem;font-size:.75rem;cursor:pointer;font-weight:700; }
    .btn-hide { background:#fff8e1;color:#856404;border:1px solid #f0c030;border-radius:6px;padding:.2rem .6rem;font-size:.75rem;cursor:pointer;font-weight:700; }
    .btn-del { background:#fdecea;color:#C44B2F;border:1px solid #C44B2F;border-radius:6px;padding:.2rem .6rem;font-size:.75rem;cursor:pointer;font-weight:700; }
    .btn-view { background:#f0f4ff;color:#1565C0;border:1px solid #1565C0;border-radius:6px;padding:.2rem .6rem;font-size:.75rem;cursor:pointer;font-weight:700;text-decoration:none; }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand">Admin Panel<small>UNESCO LAB</small></div></div>
    <div class="sidebar-istituto"><div class="nome" id="sb-user">Amministratore</div><div class="citta">Accesso globale</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Pannello</div>
      <a href="/admin/index.html"><span class="nav-icon">🏠</span> Dashboard Admin</a>
      <div class="nav-section-label">Gestione</div>
      <a href="/admin/istituti.html"><span class="nav-icon">🏫</span> Istituti</a>
      <a href="/admin/contenuti.html" class="active"><span class="nav-icon">📝</span> Contenuti</a>
      <a href="/admin/video.html"><span class="nav-icon">🎬</span> Video Tour</a>
      <a href="/admin/museo.html"><span class="nav-icon">🏛️</span> Museo</a>
    </nav>
    <div class="sidebar-footer"><button class="btn-logout" onclick="adminLogout()">Esci</button></div>
  </aside>

  <main class="dash-main">
    <header class="dash-topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">Moderazione Contenuti</span>
      </div>
    </header>

    <div class="dash-content">
      <div id="page-alert"></div>

      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;">
        <input type="text" id="search-input" class="form-control" placeholder="Cerca titolo o istituto…" style="max-width:280px;" oninput="filterTable()">
        <select id="filter-pub" class="form-control" style="max-width:160px;" onchange="filterTable()">
          <option value="">Tutti gli stati</option>
          <option value="1">Solo pubblicati</option>
          <option value="0">Solo bozze</option>
        </select>
        <select id="filter-sezione" class="form-control" style="max-width:180px;" onchange="filterTable()">
          <option value="">Tutte le sezioni</option>
          <option value="artusi">Artusi</option>
          <option value="campanello">Campanello</option>
          <option value="storie">Storie</option>
          <option value="generale">Generale</option>
        </select>
        <span id="count-label" style="font-size:.85rem;color:#888;font-weight:700;"></span>
      </div>

      <div class="panel">
        <div class="panel-body" style="padding:0;">
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th style="width:54px;">Anteprima</th><th>Titolo / Testo</th><th>Istituto</th><th>Sezione</th><th>Stato</th><th>Data</th><th>Azioni</th></tr>
              </thead>
              <tbody id="contenuti-tbody">
                <tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa;">Caricamento…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/admin/js/admin.js"></script>
<script>
let allContenuti = [];

function ytThumb(id) { return `https://img.youtube.com/vi/${id}/mqdefault.jpg`; }

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdmin();
  if (!admin) return;
  document.getElementById('sb-user').textContent = admin.username;
  try {
    allContenuti = await adminFetch('/contenuti/admin/all');
    renderTable(allContenuti);
  } catch (e) { showAlert('page-alert', e.message); }
});

function filterTable() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const pub = document.getElementById('filter-pub').value;
  const sez = document.getElementById('filter-sezione').value;
  renderTable(allContenuti.filter(c => {
    const okQ   = !q   || c.titolo.toLowerCase().includes(q) || (c.istituto_nome||'').toLowerCase().includes(q);
    const okPub = pub === '' || String(c.pubblicato) === pub;
    const okSez = !sez || c.sezione === sez;
    return okQ && okPub && okSez;
  }));
}

function renderTable(list) {
  document.getElementById('count-label').textContent = `${list.length} contenuti`;
  const sezLabel = { artusi:'Artusi', campanello:'Campanello', storie:'Storie', generale:'Generale' };
  const sezColor = { artusi:'#1B4332', campanello:'#7a4a1e', storie:'#8B1a1a', generale:'#1565C0' };
  const tbody = document.getElementById('contenuti-tbody');
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa;">Nessun risultato.</td></tr>`; return; }
  tbody.innerHTML = list.map(c => {
    let thumb = '';
    if (c.media_url) {
      thumb = `<img class="preview-thumb" src="${esc(c.media_url)}" alt="">`;
    } else if (c.tipo === 'video' && c.youtube_id) {
      thumb = `<img class="preview-thumb" src="${ytThumb(c.youtube_id)}" alt="">`;
    } else {
      const emoji = { testo:'📄', ricetta:'🍽️', immagine:'🖼️', video:'🎬' }[c.tipo] || '📄';
      thumb = `<div class="preview-thumb-placeholder" style="background:linear-gradient(135deg,${sezColor[c.sezione]||'#555'},${sezColor[c.sezione]||'#555'}99);">${emoji}</div>`;
    }
    return `
    <tr>
      <td>${thumb}</td>
      <td style="max-width:260px;">
        <div style="font-weight:700;font-size:.88rem;">${esc(c.titolo)}</div>
        <div class="corpo-preview">${esc(c.corpo||'')}</div>
      </td>
      <td style="font-size:.82rem;">
        <a href="/istituto.html?id=${c.istituto_id}&admin=1" target="_blank" style="color:#1B4332;font-weight:600;">${esc(c.istituto_nome||'—')}</a>
        <div style="font-size:.75rem;color:#aaa;">${esc(c.regione||'')}</div>
      </td>
      <td><span class="badge badge-info" style="font-size:.72rem;background:${sezColor[c.sezione]||'#555'}20;color:${sezColor[c.sezione]||'#555'};border:1px solid ${sezColor[c.sezione]||'#555'}40;">${sezLabel[c.sezione]||c.sezione}</span></td>
      <td>${c.pubblicato ? '<span class="badge badge-success">Pubblicato</span>' : '<span class="badge badge-warning">Bozza</span>'}</td>
      <td style="font-size:.78rem;color:#aaa;white-space:nowrap;">${formatDate(c.created_at)}</td>
      <td>
        <div class="td-actions">
          <button class="${c.pubblicato ? 'btn-hide' : 'btn-pub'}" onclick="toggleContenuto(${c.id}, ${c.pubblicato})">${c.pubblicato ? 'Nascondi' : 'Pubblica'}</button>
          <button class="btn-del" onclick="deleteContenuto(${c.id}, '${esc(c.titolo).replace(/'/g,"\\'")}')">Elimina</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function toggleContenuto(id, current) {
  try {
    await adminFetch(`/contenuti/admin/${id}/pubblica`, { method: 'PATCH' });
    const c = allContenuti.find(x => x.id === id);
    if (c) c.pubblicato = current ? 0 : 1;
    filterTable();
    showAlert('page-alert', current ? 'Contenuto nascosto.' : 'Contenuto pubblicato!', 'success');
  } catch (e) { showAlert('page-alert', e.message); }
}

async function deleteContenuto(id, titolo) {
  if (!confirm(`Eliminare "${titolo}"? L'azione è irreversibile.`)) return;
  try {
    await adminFetch(`/contenuti/admin/${id}`, { method: 'DELETE' });
    allContenuti = allContenuti.filter(x => x.id !== id);
    filterTable();
    showAlert('page-alert', 'Contenuto eliminato.', 'success');
  } catch (e) { showAlert('page-alert', e.message); }
}

window.filterTable = filterTable;
window.toggleContenuto = toggleContenuto;
window.deleteContenuto = deleteContenuto;
</script>
</body>
</html>
